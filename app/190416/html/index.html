<!DOCTYPE html>
<html lang="en">
<head>
  
  <!-- 该页面使用的字符编码 -->
  <meta charset="UTF-8">
  <!-- 控制 viewport 的大小和缩放,width控制viewport的大小,可以指定一个值,
    如600,或者特殊的值,如device-width,意为设备的宽度,
    initial-scale为初始缩放比例 -->
  <meta name=" " content="width=device-width, initial-scale=1.0">
  <!-- X-UA-Compatible是IE8的专用标记，是用于指定IE8浏览器去模拟某个
  特定版本的IE浏览器的渲染方式以此来解决部分兼容问题,Edge 
  模式通知 Windows Internet Explorer 以最高级别的可用模式显示内容
  ，这实际上破坏了“锁定”模式。即如果你有IE9的话说明你有IE789，
  那么就调用高版本的那个也就是IE9。 -->
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <!-- 每隔 30 秒刷新一次文档： -->
  <meta http-equiv="refresh" content="30">
  <!-- 优化搜索引擎   -->
  <meta name="keywords" content="小米">
  <title>Homepage</title>
  <!-- title前边的小图标,应该使用ico格式的图片 -->
  <link rel="icon" type="image/x-icon" href="../image/icon.ico">
  <link rel="stylesheet" href="style.css">
</head>
</head>
<body>
  
</body>
</html>
