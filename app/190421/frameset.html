<!-- 有些浏览器不支持，用<noframes>您的浏览器不支持框架</noframes>
   放在frameset外边 -->
<frameset cols="20%,20%,*">
  <frame src="https://www.baidu.com">
  <frame src="https://www.sina.com.cn">
  <frameset rows="50%,*">
      <frame src="https://www.jd.com">
      <frame src="https://www.jd.com">

  </frameset>
</frameset>
<!-- 
fallback  退化方案
degrade   降级方案
backdrop  备用方案
使用到标签里面内容的标签，方案放外边，
标签里面没有内容的标签，方案放外边。 -->
