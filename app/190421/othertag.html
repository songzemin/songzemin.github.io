<!-- 让浏览器以最新的标准来解析这个页面 -->
<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>
<body>
  h5对于外行来说,往往指的是很炫酷的网页,但是实际上h5指的是到目前为止,
  所有前端技术的集合
    包括es6,css3,html5,以及新的浏览器功能(api)
  如果不写doctype声明,页面在IE浏览器下会以quirkmode(怪异模式)渲染
    * ie6时引入,最主要的区别时css盒模型计算方面
</body>
</html>
