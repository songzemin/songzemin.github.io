<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>
<body>
  <!-- div 标签，division 没有语义的标签 
    用class来表示标签的语义,如header,footer
  -->
  <div class="header">header</div>
  <header>header</header>
  <!-- html5中新增了一些语义标签来替代原先的div标签 
  nav       用于导航，
  article   标签规定独立的自包含内容。
  aside     侧边栏，
  footer    页面底部或某一部分的底部内容，
  code      标签表达的是代码 ，与pre不一样，但常一起用
  sup sub   上标和下标
  header    页面头部或某一部分的头部内容，
  script    用来承载js代码 回退内容放在标签外边的noscript标签里
  section   标签定义文档中的节（section、区段）。
            比如章节、页眉、页脚或文档中的其他部分。
  main      文档的主要内容 -->





  <!-- 多媒体标签
  autoplay  自动播放
  loop      循环播放
  preload   预加载
  controls  控制条 -->
  <!-- 视频 -->
  
  <video autoplay loop preload controls>
    <source src="链接地址" >
  </video>
  <!-- 音频 -->
  <audio src="">
    <source src="链接地址" >
  </audio>




  <!-- value 进度， max -->
  <progress value="60" max="100">
  </progress>
</body>
</html>
